name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: machina-linux-amd64
          - os: macos-latest
            asset: machina-darwin-arm64
          - os: windows-latest
            asset: machina-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name ${{ matrix.asset }}
          --hidden-import machina_cli
          --hidden-import machina_cli.commands
          --hidden-import machina_cli.commands.auth
          --hidden-import machina_cli.commands.org
          --hidden-import machina_cli.commands.project
          --hidden-import machina_cli.commands.credentials
          --hidden-import machina_cli.commands.deploy
          --hidden-import machina_cli.commands.config_cmd
          --collect-all machina_cli
          src/machina_cli/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  github-release:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract changelog for this version
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          # Extract section for this version from CHANGELOG.md
          notes=$(awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="Release ${tag}"
          fi
          # Write to file for gh release
          echo "$notes" > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release_notes.md \
            artifacts/**/*

  publish-pypi:
    needs: [github-release]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  refresh-factory-worker:
    # After a successful PyPI release, poke the machina-factory worker on
    # Render so its Docker image rebuilds with the freshly published CLI.
    # The worker also runs `pip install -U machina-cli` on boot, so this
    # hook is the belt-and-suspenders path that closes the window where a
    # warm worker keeps serving jobs with the older baked-in CLI.
    #
    # Requires repo secret RENDER_DEPLOY_HOOK — a Deploy Hook URL created
    # at https://dashboard.render.com/worker/srv-d7fsrgosfn5c73fs6l20
    # (Settings → Deploy Hook). The step no-ops when the secret is missing
    # so releases stay unblocked if the hook is rotated or not yet set.
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not configured — skipping factory worker refresh."
            exit 0
          fi
          echo "Triggering Render deploy for machina-factory worker..."
          status=$(curl -sS -o /tmp/render_resp.json -w "%{http_code}" -X POST "$HOOK" || echo "000")
          echo "Render responded with HTTP $status"
          cat /tmp/render_resp.json | head -c 500 || true
          echo
          if [ "$status" != "200" ] && [ "$status" != "201" ]; then
            echo "::warning::Render deploy hook returned $status; the worker's on-boot refresh will still pick up the new CLI on its next restart."
          fi
